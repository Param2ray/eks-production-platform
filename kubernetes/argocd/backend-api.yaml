apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: backend-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Param2ray/eks-production-platform.git
    targetRevision: main
    path: kubernetes/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true