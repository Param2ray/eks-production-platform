apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: cluster-issuer
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Param2ray/eks-production-platform.git
    targetRevision: main
    path: kubernetes/cert-manager

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true