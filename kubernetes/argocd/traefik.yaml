apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: traefik
  namespace: argocd

spec:
  project: default

  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 40.2.0
      helm:
        valueFiles:
          - $values/kubernetes/helm-values/traefik-values.yaml

    - repoURL: https://github.com/Param2ray/eks-production-platform.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true