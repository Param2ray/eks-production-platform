apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: 512378127667.dkr.ecr.ca-central-1.amazonaws.com/eks-platform-app:12f041d9644e7a1557aaf5e7cf9f3a0ca53e24a9
          ports:
            - containerPort: 8080