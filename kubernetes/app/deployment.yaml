apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: 512378127667.dkr.ecr.ca-central-1.amazonaws.com/eks-platform-app:bbe0a6cfce16c7023182f7222e4847f4da9bf3b5
          ports:
            - containerPort: 8080
